<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="信息助手">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>网站信息助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-font-smoothing: antialiased;
        }

        /* ========== 底部导航栏 ========== */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            border-top: 0.5px solid #38383a;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #48484a;
            font-size: 10px;
            cursor: pointer;
            padding: 8px 20px;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #0a84ff;
        }

        .nav-item .icon {
            font-size: 24px;
            line-height: 1;
        }

        /* ========== 页面容器 ========== */
        .page {
            display: none;
            min-height: 100vh;
            padding-bottom: calc(70px + env(safe-area-inset-bottom));
        }

        .page.active {
            display: block;
        }

        /* ========== 页面标题 ========== */
        .page-header {
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            background: #000000;
        }

        .page-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* ========== 日期选择器 ========== */
        .date-selector {
            display: flex;
            gap: 8px;
            padding: 0 16px 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .date-selector::-webkit-scrollbar {
            display: none;
        }

        .date-btn {
            padding: 8px 16px;
            border-radius: 20px;
            background: #1c1c1e;
            border: none;
            color: #8e8e93;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .date-btn.active {
            background: #0a84ff;
            color: #ffffff;
        }

        /* ========== 网站卡片 ========== */
        .site-card {
            margin: 0 16px 12px;
            background: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        .site-card:active {
            transform: scale(0.98);
            opacity: 0.8;
        }

        .site-header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
        }

        .site-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0a84ff, #5ac8fa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .site-info {
            flex: 1;
            min-width: 0;
        }

        .site-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .site-meta {
            font-size: 13px;
            color: #8e8e93;
        }

        .site-arrow {
            color: #48484a;
            font-size: 20px;
        }

        .site-content {
            padding: 0 16px 14px;
        }

        .summary-item {
            padding: 10px 12px;
            background: #2c2c2e;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .summary-item:last-child {
            margin-bottom: 0;
        }

        .summary-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffffff;
        }

        .summary-text {
            font-size: 13px;
            line-height: 1.4;
            color: #8e8e93;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state .text {
            color: #8e8e93;
            font-size: 15px;
        }

        /* ========== 对话列表页 ========== */
        .chat-list-page {
            display: none;
        }

        .chat-list-page.active {
            display: block;
        }

        .chat-list {
            padding: 8px 16px;
        }

        .chat-list-item {
            background: #1c1c1e;
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
            position: relative;
        }

        .chat-list-item-inner {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            background: #1c1c1e;
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .chat-list-item.swiped .chat-list-item-inner {
            transform: translateX(-60px);
        }

        .chat-list-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0a84ff, #5ac8fa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .chat-list-info {
            flex: 1;
            min-width: 0;
        }

        .chat-list-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .chat-list-preview {
            font-size: 13px;
            color: #8e8e93;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-list-time {
            font-size: 12px;
            color: #48484a;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .chat-list-delete {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 60px;
            background: #ff453a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            color: white;
            font-size: 14px;
            font-weight: 500;
            border-radius: 0 10px 10px 0;
        }

        /* ========== 对话页 ========== */
        .chat-page {
            display: none;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            background: #000000;
        }

        .chat-page.active {
            display: flex;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid #38383a;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: #0a84ff;
            font-size: 28px;
            cursor: pointer;
            padding: 4px 8px 4px 0;
            line-height: 1;
        }

        .chat-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
        }

        .chat-header-placeholder {
            width: 36px;
        }

        /* ========== 历史摘要区（压缩） ========== */
        .history-section {
            max-height: 100px;
            overflow-y: auto;
            background: #1c1c1e;
            padding: 8px 12px;
            flex-shrink: 0;
        }

        .history-label {
            font-size: 11px;
            color: #8e8e93;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-item {
            background: #2c2c2e;
            border-radius: 6px;
            padding: 6px 8px;
            margin-bottom: 6px;
            position: relative;
        }

        .history-item:last-child {
            margin-bottom: 0;
        }

        .history-item-title {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
            padding-right: 45px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-content {
            font-size: 11px;
            line-height: 1.3;
            color: #8e8e93;
            padding-right: 45px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .quote-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            padding: 4px 8px;
            background: rgba(10, 132, 255, 0.2);
            border: none;
            border-radius: 4px;
            color: #0a84ff;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
        }

        .quote-btn:active {
            background: #0a84ff;
            color: #ffffff;
        }

        /* ========== 对话区域 ========== */
        .chat-body {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            padding-right: 50px;
            background: #000000;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 12px;
            max-width: 90%;
        }

        .message.user {
            margin-left: auto;
        }

        .message.assistant {
            margin-right: auto;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 16px;
            line-height: 1.5;
            position: relative;
        }

        .message.user .message-content {
            background: #0a84ff;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #1c1c1e;
            color: #ffffff;
            border-bottom-left-radius: 4px;
        }

        .model-tag {
            font-size: 10px;
            color: #8e8e93;
            margin-bottom: 4px;
        }

        /* 长按复制提示 */
        .copy-tooltip {
            position: fixed;
            background: rgba(28, 28, 30, 0.95);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        .copy-tooltip.show {
            display: block;
        }

        /* ========== 右侧翻页按钮 ========== */
        .side-nav {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
        }

        .side-nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(58, 58, 60, 0.95);
            border: 2px solid #48484a;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .side-nav-btn:active:not(:disabled) {
            background: #0a84ff;
            border-color: #0a84ff;
            transform: scale(1.1);
        }

        .side-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .export-btn {
            background: rgba(10, 132, 255, 0.8);
            border-color: #0a84ff;
            font-size: 14px;
        }

        /* ========== 加载动画 ========== */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #48484a;
            border-radius: 50%;
            animation: typing 1s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ========== 输入区域 ========== */
        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 16px;
            padding-bottom: max(28px, calc(env(safe-area-inset-bottom) + 8px));
            background: #000000;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            background: #1c1c1e;
            border-radius: 24px;
            padding: 0 4px;
            min-height: 48px;
        }

        #promptInput {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            display: none;
        }

        #promptInput.active {
            display: block;
        }

        #promptInput::placeholder {
            color: #48484a;
        }

        /* 文字提示 */
        .voice-placeholder {
            flex: 1;
            padding: 12px 16px;
            color: #8e8e93;
            font-size: 15px;
            display: none;
        }

        .voice-placeholder.active {
            display: block;
        }

        /* 语音输入按钮 - 豆包风格 */
        .voice-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            border: none;
            border-radius: 50%;
            color: #0a84ff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            margin-right: 2px;
        }

        .voice-btn:active {
            background: rgba(10, 132, 255, 0.2);
            transform: scale(0.95);
        }

        .voice-btn.recording {
            color: #ff453a;
            animation: pulse-voice 1.2s infinite;
        }

        @keyframes pulse-voice {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* 录音状态提示 */
        .recording-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 69, 58, 0.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            z-index: 100;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .recording-hint.show {
            display: flex;
        }

        .recording-hint .dot {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 模式切换按钮 */
        .mode-switch-btn {
            width: 50px;
            height: 50px;
            background: #2c2c2e;
            border: none;
            border-radius: 50%;
            color: #8e8e93;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mode-switch-btn:active {
            background: #3a3a3c;
            color: #0a84ff;
        }

        #sendBtn {
            width: 50px;
            height: 50px;
            background: #0a84ff;
            border: none;
            border-radius: 50%;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendBtn:disabled {
            background: #2c2c2e;
            color: #48484a;
            cursor: not-allowed;
        }

        /* 语音提示文字 */
        .voice-hint {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.95);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #8e8e93;
            white-space: nowrap;
            z-index: 100;
        }

        /* ========== 设置页 ========== */
        .settings-section {
            padding: 16px;
        }

        .settings-group {
            background: #1c1c1e;
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .settings-group-title {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 8px;
            padding: 0 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .settings-item {
            padding: 14px 16px;
            border-bottom: 0.5px solid #38383a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-size: 15px;
            color: #ffffff;
        }

        .settings-value {
            font-size: 15px;
            color: #8e8e93;
        }

        .api-key-item {
            flex-direction: column;
            align-items: stretch;
        }

        .api-key-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .api-key-label {
            font-size: 15px;
            color: #ffffff;
        }

        .default-badge {
            background: #0a84ff;
            color: #ffffff;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .api-key-input {
            width: 100%;
            background: #2c2c2e;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            color: #ffffff;
            font-size: 14px;
        }

        .api-key-input:focus {
            outline: none;
            background: #3a3a3c;
        }

        .set-default-btn {
            margin-top: 0;
            padding: 4px 8px;
            background: transparent;
            border: none;
            color: #0a84ff;
            font-size: 13px;
            cursor: pointer;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1c1e;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .toast.show {
            opacity: 1;
        }

        /* ========== 滚动条 ========== */
        ::-webkit-scrollbar {
            width: 2px;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a3c;
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <!-- 概览页 -->
    <div id="overviewPage" class="page active">
        <div class="page-header">
            <h1 class="page-title">概览</h1>
        </div>
        
        <div class="date-selector" id="dateSelector">
            <button class="date-btn active" data-date="today">今天</button>
            <button class="date-btn" data-date="yesterday">昨天</button>
            <button class="date-btn" data-date="2days">前天</button>
        </div>

        <div id="sitesContainer"></div>
    </div>

    <!-- 对话列表页 -->
    <div id="chatListPage" class="page chat-list-page">
        <div class="page-header">
            <h1 class="page-title">对话</h1>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <!-- 对话页 -->
    <div id="chatPage" class="page chat-page">
        <div class="chat-header">
            <button class="back-btn" onclick="exitChat()">‹</button>
            <div class="chat-title" id="chatTitle">对话</div>
            <div class="chat-header-placeholder"></div>
        </div>

        <div class="history-section" id="historySection"></div>

        <div class="chat-body">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="side-nav">
                <button class="side-nav-btn" id="prevBtn" onclick="goToPrevQA()">↑</button>
                <button class="side-nav-btn" id="nextBtn" onclick="goToNextQA()">↓</button>
                <button class="side-nav-btn export-btn" onclick="exportToWord()">📄</button>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="promptInput" placeholder="输入消息...">
                <div class="voice-placeholder" id="voicePlaceholder">点击麦克风开始语音输入</div>
                <button class="voice-btn" id="voiceBtn">🎤</button>
            </div>
            <button class="mode-switch-btn" id="modeSwitchBtn" onclick="toggleInputMode()">⌨️</button>
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        
        <!-- 录音状态提示 -->
        <div class="recording-hint" id="recordingHint">
            <span class="dot"></span>
            <span>正在聆听...</span>
        </div>
    </div>

    <!-- 设置页 -->
    <div id="settingsPage" class="page">
        <div class="page-header">
            <h1 class="page-title">我的</h1>
        </div>

        <div class="settings-section">
            <div class="settings-group-title">AI 模型配置</div>
            <div class="settings-group">
                <div class="settings-item api-key-item">
                    <div class="api-key-header">
                        <span class="api-key-label">智谱 AI</span>
                        <span>
                            <span class="default-badge" id="zhipuBadge" style="display: none;">默认</span>
                            <button class="set-default-btn" style="margin-top:0;display:inline-block;" onclick="setDefaultModel('zhipu')">设为默认</button>
                        </span>
                    </div>
                    <input type="password" class="api-key-input" id="zhipuKey" placeholder="输入 API Key">
                </div>
                <div class="settings-item api-key-item">
                    <div class="api-key-header">
                        <span class="api-key-label">DeepSeek</span>
                        <span>
                            <span class="default-badge" id="deepseekBadge" style="display: none;">默认</span>
                            <button class="set-default-btn" style="margin-top:0;display:inline-block;" onclick="setDefaultModel('deepseek')">设为默认</button>
                        </span>
                    </div>
                    <input type="password" class="api-key-input" id="deepseekKey" placeholder="输入 API Key">
                </div>
                <div class="settings-item api-key-item">
                    <div class="api-key-header">
                        <span class="api-key-label">豆包</span>
                        <span>
                            <span class="default-badge" id="doubaoBadge" style="display: none;">默认</span>
                            <button class="set-default-btn" style="margin-top:0;display:inline-block;" onclick="setDefaultModel('doubao')">设为默认</button>
                        </span>
                    </div>
                    <input type="password" class="api-key-input" id="doubaoKey" placeholder="输入 API Key">
                </div>
                <div class="settings-item api-key-item">
                    <div class="api-key-header">
                        <span class="api-key-label">美团 LongCat</span>
                        <span>
                            <span class="default-badge" id="longcatBadge" style="display: none;">默认</span>
                            <button class="set-default-btn" style="margin-top:0;display:inline-block;" onclick="setDefaultModel('longcat')">设为默认</button>
                        </span>
                    </div>
                    <input type="password" class="api-key-input" id="longcatKey" placeholder="输入 API Key">
                </div>
            </div>

            <button class="settings-item" style="background: #0a84ff; color: #fff; justify-content: center; border-radius: 10px; font-size: 16px; font-weight: 600;" onclick="saveSettings()">保存设置</button>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="nav-bar" id="navBar">
        <div class="nav-item active" onclick="switchPage('overview')">
            <span class="icon">◇</span>
            <span>概览</span>
        </div>
        <div class="nav-item" onclick="switchPage('chatList')">
            <span class="icon">💬</span>
            <span>对话</span>
        </div>
        <div class="nav-item" onclick="switchPage('settings')">
            <span class="icon">⚙</span>
            <span>我的</span>
        </div>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <!-- 复制提示 -->
    <div class="copy-tooltip" id="copyTooltip">已复制</div>

    <script>
        // ========== 数据地址 ==========
        const DATA_URL = 'https://cdn.jsdelivr.net/gh/woaipashanhu/web-assistant/data.json';

        // ========== 默认网站配置（9个RSS源） ==========
        const DEFAULT_SITES = [
            { id: 'site_0', name: 'Wired科技', icon: '💻', url: 'https://www.wired.com/feed/rss' },
            { id: 'site_1', name: 'TechCrunch', icon: '🚀', url: 'https://techcrunch.com/feed/' },
            { id: 'site_2', name: 'BBC世界', icon: '🌍', url: 'https://feeds.bbci.co.uk/news/world/rss.xml' },
            { id: 'site_3', name: 'CNBC市场', icon: '📈', url: 'https://www.cnbc.com/id/10000664/device/rss/rss.html' },
            { id: 'site_4', name: 'WSJ财经', icon: '📊', url: 'https://feeds.a.dj.com/rss/RSSMarketsMain.xml' },
            { id: 'site_5', name: 'The Hill国会', icon: '🏛️', url: 'https://thehill.com/feed/' },
            { id: 'site_6', name: '雅虎财经', icon: '💰', url: 'https://finance.yahoo.com/news/rssindex' },
            { id: 'site_7', name: 'ScienceDaily', icon: '🔬', url: 'https://www.sciencedaily.com/rss/all.xml' },
            { id: 'site_8', name: 'Science News', icon: '🧪', url: 'https://www.sciencenews.org/feed' }
        ];

        // ========== AI模型配置 ==========
        const AI_MODELS = {
            zhipu: { name: '智谱AI', url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions', model: 'glm-4-flash' },
            deepseek: { name: 'DeepSeek', url: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat' },
            doubao: { name: '豆包', url: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions', model: 'doubao-pro-32k' },
            longcat: { name: '美团 LongCat', url: 'https://api.longcat.chat/openai/v1/chat/completions', model: 'longcat-flash-chat' }
        };

        // ========== 全局状态 ==========
        let currentSite = null;
        let currentQAIndex = -1;
        let sites = DEFAULT_SITES;
        let settings = {};
        let chatHistories = {};
        let summaries = {};
        let selectedDate = 'today';

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
            initSpeechRecognition();
            updateInputUI();
            loadSettings();
            loadSummariesFromAPI();
            loadChatHistories();
        });

        // ========== 加载数据 ==========
        async function loadSummariesFromAPI() {
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('加载数据失败');
                
                const data = await response.json();
                
                if (data.sites) sites = data.sites;
                
                if (data.data) {
                    const today = data.date || new Date().toISOString().split('T')[0];
                    for (const siteId in data.data) {
                        const siteData = data.data[siteId];
                        if (!summaries[siteId]) summaries[siteId] = {};
                        summaries[siteId][today] = siteData.items || [];
                    }
                }
                
                if (data.lastUpdate) console.log('数据最后更新:', data.lastUpdate);
            } catch (error) {
                console.error('加载数据失败:', error);
                showToast('加载数据失败，请稍后重试');
            }
            renderOverview();
        }

        // ========== 加载聊天历史 ==========
        function loadChatHistories() {
            const saved = localStorage.getItem('assistantChats');
            if (saved) chatHistories = JSON.parse(saved);
        }

        // ========== 页面切换 ==========
        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('navBar').style.display = 'flex';
            
            if (page === 'overview') {
                document.getElementById('overviewPage').classList.add('active');
                document.querySelectorAll('.nav-item')[0].classList.add('active');
            } else if (page === 'chatList') {
                document.getElementById('chatListPage').classList.add('active');
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                renderChatList();
            } else if (page === 'settings') {
                document.getElementById('settingsPage').classList.add('active');
                document.querySelectorAll('.nav-item')[2].classList.add('active');
            }
        }

        function exitChat() {
            currentSite = null;
            document.getElementById('chatPage').classList.remove('active');
            document.getElementById('navBar').style.display = 'flex';
        }

        // ========== 数据加载 ==========
        function loadSettings() {
            const saved = localStorage.getItem('assistantSettings');
            settings = saved ? JSON.parse(saved) : { apiKeys: {}, defaultModel: 'zhipu' };
            
            if (settings.apiKeys) {
                document.getElementById('zhipuKey').value = settings.apiKeys.zhipu || '';
                document.getElementById('deepseekKey').value = settings.apiKeys.deepseek || '';
                document.getElementById('doubaoKey').value = settings.apiKeys.doubao || '';
                document.getElementById('longcatKey').value = settings.apiKeys.longcat || '';
            }
            updateDefaultModelDisplay();
        }

        // ========== 概览页渲染 ==========
        function renderOverview() {
            const container = document.getElementById('sitesContainer');
            if (sites.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📰</div><div class="text">暂无数据</div></div>';
                return;
            }
            container.innerHTML = sites.map((site, index) => `
                <div class="site-card" onclick="enterChat(${index})">
                    <div class="site-header">
                        <div class="site-icon">${site.icon || '📰'}</div>
                        <div class="site-info">
                            <div class="site-name">${site.name}</div>
                            <div class="site-meta">${getSummaryCount(site.id)} 条摘要</div>
                        </div>
                        <span class="site-arrow">›</span>
                    </div>
                    <div class="site-content">${renderSiteSummaries(site.id)}</div>
                </div>
            `).join('');
        }

        function getSummaryCount(siteId) {
            const targetDate = getSelectedDate();
            return summaries[siteId]?.[targetDate]?.length || 0;
        }

        function renderSiteSummaries(siteId) {
            const targetDate = getSelectedDate();
            const siteSummaries = summaries[siteId]?.[targetDate] || [];
            if (siteSummaries.length === 0) return '<div style="color:#8e8e93;text-align:center;padding:12px;font-size:14px;">暂无数据</div>';
            return siteSummaries.map(item => `<div class="summary-item"><div class="summary-title">${item.title}</div><div class="summary-text">${item.summary}</div></div>`).join('');
        }

        function getSelectedDate() {
            const today = new Date();
            if (selectedDate === 'yesterday') today.setDate(today.getDate() - 1);
            else if (selectedDate === '2days') today.setDate(today.getDate() - 2);
            return today.toISOString().split('T')[0];
        }

        function getDateLabel() {
            if (selectedDate === 'today') return '今天';
            if (selectedDate === 'yesterday') return '昨天';
            return '前天';
        }

        function getDateLabelForSite(siteId) {
            const siteSummaries = summaries[siteId] || {};
            const dates = Object.keys(siteSummaries).sort().reverse();
            if (dates.length === 0) return '暂无';
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            const lastDate = dates[0];
            if (lastDate === today) return '今天';
            if (lastDate === yesterday) return '昨天';
            return lastDate;
        }

        // ========== 对话列表页 ==========
        function renderChatList() {
            const container = document.getElementById('chatList');
            const siteIds = Object.keys(chatHistories).filter(id => chatHistories[id] && chatHistories[id].length > 0);
            
            if (siteIds.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><div class="text">暂无历史对话</div></div>';
                return;
            }

            container.innerHTML = siteIds.map(siteId => {
                const site = sites.find(s => s.id === siteId) || { name: '未知网站', icon: '📰' };
                const history = chatHistories[siteId];
                const lastMsg = history[history.length - 1];
                
                return `
                    <div class="chat-list-item" data-site-id="${siteId}">
                        <div class="chat-list-delete" onclick="event.stopPropagation(); deleteChatHistory('${siteId}')">删除</div>
                        <div class="chat-list-item-inner" onclick="enterChatFromList('${siteId}')">
                            <div class="chat-list-icon">${site.icon}</div>
                            <div class="chat-list-info">
                                <div class="chat-list-name">${site.name} <span style="color:#0a84ff;font-size:12px;">· ${getDateLabelForSite(siteId)}</span></div>
                                <div class="chat-list-preview">${lastMsg.content.substring(0, 30)}...</div>
                            </div>
                            <div class="chat-list-time">${formatTime(lastMsg.timestamp)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            initSwipeDelete();
        }

        function initSwipeDelete() {
            document.querySelectorAll('.chat-list-item').forEach(item => {
                let startX = 0, currentX = 0, isSwiping = false;
                
                item.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    isSwiping = true;
                    item.style.transition = 'none';
                });

                item.addEventListener('touchmove', (e) => {
                    if (!isSwiping) return;
                    currentX = e.touches[0].clientX;
                    const diff = currentX - startX;
                    if (diff <= 0 && diff >= -70) {
                        item.querySelector('.chat-list-item-inner').style.transform = `translateX(${diff}px)`;
                    } else if (diff > 0) {
                        item.querySelector('.chat-list-item-inner').style.transform = 'translateX(0)';
                    }
                });

                item.addEventListener('touchend', () => {
                    isSwiping = false;
                    const diff = currentX - startX;
                    item.style.transition = 'transform 0.3s';
                    item.querySelector('.chat-list-item-inner').style.transform = diff < -35 ? 'translateX(-60px)' : 'translateX(0)';
                });
            });
        }

        function enterChatFromList(siteId) {
            const siteIndex = sites.findIndex(s => s.id === siteId);
            if (siteIndex >= 0) enterChat(siteIndex);
        }

        function deleteChatHistory(siteId) {
            delete chatHistories[siteId];
            localStorage.setItem('assistantChats', JSON.stringify(chatHistories));
            renderChatList();
            showToast('已删除');
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return (date.getMonth() + 1) + '/' + date.getDate();
        }

        // ========== 对话页 ==========
        function enterChat(siteIndex) {
            currentSite = sites[siteIndex];
            document.getElementById('chatTitle').textContent = currentSite.name + ' ' + getDateLabel();
            renderHistorySection();
            renderChatMessages();
            document.getElementById('chatPage').classList.add('active');
            document.getElementById('navBar').style.display = 'none';
        }

        function renderHistorySection() {
            const container = document.getElementById('historySection');
            const siteSummaries = summaries[currentSite.id] || {};
            const dates = Object.keys(siteSummaries).sort().reverse();
            
            if (dates.length === 0) {
                container.innerHTML = '<div class="history-label">暂无摘要</div>';
                return;
            }
            
            // 显示3条摘要
            const items = siteSummaries[dates[0]].slice(0, 3);
            container.innerHTML = `
                <div class="history-label">今日摘要</div>
                ${items.map(item => `
                    <div class="history-item">
                        <div class="history-item-title">${item.title}</div>
                        <div class="history-item-content">${item.summary}</div>
                        <button class="quote-btn" onclick='quoteAndSend(${JSON.stringify(item.title + ": " + item.summary).replace(/'/g, "\\'")})'>引用</button>
                    </div>
                `).join('')}
            `;
        }

        function renderChatMessages() {
            const history = chatHistories[currentSite?.id] || [];
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            
            if (history.length === 0) {
                container.innerHTML = '<div class="message assistant"><div class="message-content">你好！我是网站信息助手，你可以引用上方的摘要内容向我提问。</div></div>';
                currentQAIndex = -1;
            } else {
                history.forEach((msg, index) => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.role}`;
                    div.setAttribute('data-index', index);
                    
                    if (msg.role === 'assistant' && msg.model) {
                        div.innerHTML = `<div class="model-tag">${msg.model}</div><div class="message-content">${formatMessage(msg.content)}</div>`;
                    } else {
                        div.innerHTML = `<div class="message-content">${formatMessage(msg.content)}</div>`;
                    }
                    
                    container.appendChild(div);
                });
                
                container.scrollTop = container.scrollHeight;
                currentQAIndex = Math.floor((history.length - 1) / 2);
            }
            updateNavArrows();
            initLongPress();
        }

        // ========== 长按复制功能（全选） ==========
        function initLongPress() {
            const messages = document.querySelectorAll('.message-content');
            let longPressTimer;
            
            messages.forEach(msg => {
                // 设置为可选择文本
                msg.style.webkitUserSelect = 'text';
                msg.style.userSelect = 'text';
                
                msg.addEventListener('touchstart', (e) => {
                    longPressTimer = setTimeout(() => {
                        // 长按后全选文本，让系统菜单出现
                        const selection = window.getSelection();
                        const range = document.createRange();
                        range.selectNodeContents(msg);
                        selection.removeAllRanges();
                        selection.addRange(range);
                    }, 500);
                });
                
                msg.addEventListener('touchend', () => {
                    clearTimeout(longPressTimer);
                });
                
                msg.addEventListener('touchmove', () => {
                    clearTimeout(longPressTimer);
                });
            });
        }

        function showCopyTooltip(x, y) {
            const tooltip = document.getElementById('copyTooltip');
            tooltip.style.left = x + 'px';
            tooltip.style.top = (y - 40) + 'px';
            tooltip.classList.add('show');
            setTimeout(() => tooltip.classList.remove('show'), 1500);
        }

        // ========== 上下翻页功能 ==========
        function goToPrevQA() {
            const history = chatHistories[currentSite?.id] || [];
            if (history.length === 0) return;
            
            if (currentQAIndex > 0) {
                currentQAIndex--;
                const userMsgIndex = currentQAIndex * 2;
                scrollToMessage(userMsgIndex);
                updateNavArrows();
            }
        }

        function goToNextQA() {
            const history = chatHistories[currentSite?.id] || [];
            if (history.length === 0) return;
            
            const maxIndex = Math.floor((history.length - 1) / 2);
            if (currentQAIndex < maxIndex) {
                currentQAIndex++;
                const userMsgIndex = currentQAIndex * 2;
                scrollToMessage(userMsgIndex);
                updateNavArrows();
            }
        }

        function scrollToMessage(index) {
            const container = document.getElementById('chatMessages');
            const messages = container.querySelectorAll('.message');
            if (messages[index]) {
                messages[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                messages[index].style.background = 'rgba(10, 132, 255, 0.2)';
                setTimeout(() => messages[index].style.background = '', 1000);
            }
        }

        function updateNavArrows() {
            const history = chatHistories[currentSite?.id] || [];
            const maxIndex = Math.floor((history.length - 1) / 2);
            document.getElementById('prevBtn').disabled = currentQAIndex <= 0;
            document.getElementById('nextBtn').disabled = currentQAIndex >= maxIndex || history.length === 0;
        }

        // ========== 引用功能 ==========
        async function quoteAndSend(content) {
            const fullMessage = `[引用内容]\n${content}\n\n请帮我分析一下这段内容。`;
            const displayContent = `📝 引用内容：\n${content}\n\n请帮我分析这段内容。`;
            
            addChatMessage('user', displayContent);
            saveChatHistory('user', displayContent);
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            document.getElementById('chatMessages').appendChild(loadingDiv);

            try {
                const result = await callAI(fullMessage);
                loadingDiv.remove();
                addChatMessage('assistant', result.content, result.modelName);
                saveChatHistory('assistant', result.content, result.modelName);
            } catch (error) {
                loadingDiv.remove();
                addChatMessage('assistant', `错误: ${error.message}`, '系统');
            }
        }

        // ========== 消息发送 ==========
        async function sendMessage() {
            const input = document.getElementById('promptInput');
            const message = input.value.trim();
            if (!message) return;

            addChatMessage('user', message);
            saveChatHistory('user', message);
            input.value = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            document.getElementById('chatMessages').appendChild(loadingDiv);

            try {
                const result = await callAI(message);
                loadingDiv.remove();
                addChatMessage('assistant', result.content, result.modelName);
                saveChatHistory('assistant', result.content, result.modelName);
            } catch (error) {
                loadingDiv.remove();
                addChatMessage('assistant', `错误: ${error.message}`, '系统');
            }
        }

        function addChatMessage(role, content, model = null) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            if (role === 'assistant' && model) {
                div.innerHTML = `<div class="model-tag">${model}</div><div class="message-content">${formatMessage(content)}</div>`;
            } else {
                div.innerHTML = `<div class="message-content">${formatMessage(content)}</div>`;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            const history = chatHistories[currentSite?.id] || [];
            currentQAIndex = Math.floor((history.length - 1) / 2);
            updateNavArrows();
            initLongPress();
        }

        function saveChatHistory(role, content, model = null) {
            if (!currentSite) return;
            if (!chatHistories[currentSite.id]) chatHistories[currentSite.id] = [];
            chatHistories[currentSite.id].push({ role, content, model, timestamp: Date.now() });
            localStorage.setItem('assistantChats', JSON.stringify(chatHistories));
        }

        // ========== 导出Word ==========
        function exportToWord() {
            const history = chatHistories[currentSite?.id] || [];
            if (history.length === 0) {
                showToast('暂无对话内容');
                return;
            }
            
            let content = `<html><head><meta charset="UTF-8"><title>对话记录</title></head><body>`;
            content += `<h1>${currentSite.name} - 对话记录</h1>`;
            content += `<p>导出时间: ${new Date().toLocaleString()}</p><hr>`;
            
            history.forEach(msg => {
                const role = msg.role === 'user' ? '我' : (msg.model || 'AI');
                content += `<p><strong>${role}:</strong></p>`;
                content += `<p style="margin-left:20px;white-space:pre-wrap;">${msg.content}</p><br>`;
            });
            
            content += `</body></html>`;
            
            const blob = new Blob([content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentSite.name}_对话记录_${new Date().toISOString().split('T')[0]}.doc`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('导出成功');
        }

        // ========== AI调用 ==========
        async function callAI(prompt) {
            const modelKey = settings.defaultModel || 'zhipu';
            const modelConfig = AI_MODELS[modelKey];
            const apiKey = settings.apiKeys?.[modelKey];

            if (!apiKey) {
                throw new Error(`请先在设置中配置 ${modelConfig.name} 的 API 密钥`);
            }

            const response = await fetch(modelConfig.url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: modelConfig.model,
                    messages: [
                        { role: 'system', content: '你是一个专业的信息分析助手。请基于用户提供的内容给出专业、准确的回答。' },
                        { role: 'user', content: prompt }
                    ]
                })
            });

            if (!response.ok) throw new Error('API 调用失败');
            const data = await response.json();
            return { content: data.choices[0].message.content, modelName: modelConfig.name };
        }

        // ========== 语音输入功能 ==========
        let isVoiceMode = true;
        let isRecording = false;
        let recognition = null;

        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';

                recognition.onresult = (event) => {
                    document.getElementById('promptInput').value = event.results[0][0].transcript;
                };

                recognition.onend = () => {
                    if (isRecording) {
                        stopRecording();
                        const message = document.getElementById('promptInput').value.trim();
                        if (message) sendMessage();
                    }
                };

                recognition.onerror = () => {
                    stopRecording();
                    showToast('语音识别失败');
                };
            }
        }

        function toggleInputMode() {
            isVoiceMode = !isVoiceMode;
            updateInputUI();
        }

        function updateInputUI() {
            const voiceBtn = document.getElementById('voiceBtn');
            const voicePlaceholder = document.getElementById('voicePlaceholder');
            const promptInput = document.getElementById('promptInput');
            const sendBtn = document.getElementById('sendBtn');
            const modeSwitchBtn = document.getElementById('modeSwitchBtn');

            if (isVoiceMode) {
                voiceBtn.style.display = 'flex';
                voicePlaceholder.classList.add('active');
                promptInput.classList.remove('active');
                sendBtn.style.display = 'none';
                modeSwitchBtn.textContent = '⌨️';
            } else {
                voiceBtn.style.display = 'flex';
                voicePlaceholder.classList.remove('active');
                promptInput.classList.add('active');
                sendBtn.style.display = 'flex';
                modeSwitchBtn.textContent = '🎤';
                setTimeout(() => promptInput.focus(), 100);
            }
        }

        // 语音按钮点击事件
        function initVoiceEvents() {
            const voiceBtn = document.getElementById('voiceBtn');
            if (!voiceBtn) return;
            
            voiceBtn.addEventListener('click', () => {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });
        }

        // 初始化语音事件
        document.addEventListener('DOMContentLoaded', () => {
            initVoiceEvents();
        });

        function startRecording() {
            if (!recognition) {
                showToast('您的浏览器不支持语音输入');
                return;
            }
            isRecording = true;
            const voiceBtn = document.getElementById('voiceBtn');
            const recordingHint = document.getElementById('recordingHint');
            const voicePlaceholder = document.getElementById('voicePlaceholder');
            voiceBtn.classList.add('recording');
            voiceBtn.textContent = '🔴';
            voicePlaceholder.textContent = '正在识别语音...';
            recordingHint.classList.add('show');
            try { recognition.start(); } catch (e) { stopRecording(); }
        }

        function stopRecording() {
            isRecording = false;
            const voiceBtn = document.getElementById('voiceBtn');
            const recordingHint = document.getElementById('recordingHint');
            const voicePlaceholder = document.getElementById('voicePlaceholder');
            voiceBtn.classList.remove('recording');
            voiceBtn.textContent = '🎤';
            voicePlaceholder.textContent = '点击麦克风开始语音输入';
            recordingHint.classList.remove('show');
            try { recognition.stop(); } catch (e) {}
        }

        // ========== 设置页 ==========
        function setDefaultModel(modelKey) {
            settings.defaultModel = modelKey;
            localStorage.setItem('assistantSettings', JSON.stringify(settings));
            updateDefaultModelDisplay();
            showToast(`已设置 ${AI_MODELS[modelKey].name} 为默认`);
        }

        function updateDefaultModelDisplay() {
            ['zhipu', 'deepseek', 'doubao', 'longcat'].forEach(key => {
                const badge = document.getElementById(key + 'Badge');
                if (badge) badge.style.display = settings.defaultModel === key ? 'inline' : 'none';
            });
        }

        function saveSettings() {
            settings.apiKeys = {
                zhipu: document.getElementById('zhipuKey').value,
                deepseek: document.getElementById('deepseekKey').value,
                doubao: document.getElementById('doubaoKey').value,
                longcat: document.getElementById('longcatKey').value
            };
            localStorage.setItem('assistantSettings', JSON.stringify(settings));
            showToast('设置已保存');
            switchPage('overview');
        }

        // ========== 工具函数 ==========
        function formatMessage(content) {
            return content.replace(/\n/g, '<br>');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ========== 事件监听 ==========
        document.getElementById('promptInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('dateSelector').addEventListener('click', (e) => {
            if (e.target.classList.contains('date-btn')) {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                selectedDate = e.target.dataset.date;
                renderOverview();
            }
        });
    </script>
</body>
</html>
